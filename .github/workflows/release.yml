name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "bibguard Desktop ${{ github.ref_name }}"
          releaseBody: |
            ## bibguard Desktop ${{ github.ref_name }}

            Cross-platform desktop app for detecting hallucinated citations in academic papers.

            ### Download

            | Platform | File |
            |----------|------|
            | **Windows** | `.msi` installer |
            | **macOS (Apple Silicon)** | `.dmg` |
            | **macOS (Intel)** | `.dmg` |
            | **Linux** | `.deb` / `.AppImage` |

            ### What's inside

            - Drag-and-drop `.bib` file verification
            - 5-source cascade: arXiv, Crossref, DBLP, Semantic Scholar, OpenAlex
            - Phantom DOI/arXiv ID detection with kill-shot logic
            - Real-time progress tracking
            - One-click report export (Markdown)
            - No Python, no terminal — just double-click and go

            Built with [Tauri](https://tauri.app) + [bibguard](https://github.com/GeoffreyWang1117/bibguard) engine.
          releaseDraft: false
          prerelease: false
